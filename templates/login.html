<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineShop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1>MineShop</h1>
            <p class="subtitle">Join the server, player.</p>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" autocomplete="off" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Connect</button>
            </form>
            <p class="login-error" id="login-error"></p>
        </div>
    </div>
    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const err = document.getElementById("login-error");
            err.textContent = "";
            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value,
                    }),
                });
                const data = await res.json();
                if (data.success) window.location.href = "/game";
                else err.textContent = data.message;
            } catch (e) {
                err.textContent = "Connection failed. Is the server running?";
            }
        });
    </script>
</body>
</html>
